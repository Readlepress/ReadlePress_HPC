name: readlepress
description: ReadlePress teacher-facing observation capture app with offline-first architecture.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  dio: ^5.4.0
  flutter_riverpod: ^2.4.9
  workmanager: ^0.5.2
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  connectivity_plus: ^5.0.2
  flutter_secure_storage: ^9.0.0
  json_annotation: ^4.8.1
  uuid: ^4.2.2
  path: ^1.8.3
  path_provider: ^2.1.2
  image_picker: ^1.0.7
  intl: ^0.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  isar_generator: ^3.1.0+1
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
