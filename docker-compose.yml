version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: readlepress-db
    environment:
      POSTGRES_DB: readlepress
      POSTGRES_USER: readlepress_admin
      POSTGRES_PASSWORD: dev_password_only
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    command: >
      postgres
        -c shared_preload_libraries='pg_stat_statements'
        -c log_statement=all
        -c row_security=on
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U readlepress_admin -d readlepress"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: readlepress-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass dev_redis_password
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "dev_redis_password", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
